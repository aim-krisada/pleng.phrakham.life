<!doctype html>
<!--
  A/B render for the ENSEMBLE pre-echo rule (PM 24 ก.ค.).

  Renders through the REAL playEnsemble — not a re-implementation. The trick: playEnsemble builds its
  AudioContext from `window.AudioContext`, so we hand it an OfflineAudioContext. sampler.js duck-types
  offline on `startRendering` and injects the big-lookahead scheduler itself, so notes past 200 ms are
  not silent (the bug fixed in the P3 spike).

  ONE render per page load (playEnsemble caches its context in a module global), driven by the query
  string, so every clip is a clean room:
    ?number=747&lead=violin&pre=off&atBeat=6&pad=3&tail=6
  A and B differ ONLY in `pre` — same songId ⇒ same humanize seed ⇒ the same performance, with the
  vetoed ornament missing. The clip is cropped AFTER a full-length render, so cropping cannot change
  what was scheduled.

  Not shipped. Driven by tools/render-ensemble-ab.mjs.
-->
