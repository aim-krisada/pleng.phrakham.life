<!doctype html>
<html>
<head><meta charset="utf-8"><title>B107 P2 — audio verify (OfflineAudioContext)</title></head>
<body>
<h1>B107 P2 arranger — real-audio measurement</h1>
<p>Renders the SYNTH path offline through the real arrange()+scheduleNote pipeline and measures
peak / balance / humanize spread. (Sampler timbre is verified by ear on the real app.)</p>
<pre id="out">running…</pre>
<script type="module">
import { songToNotes, buildChordVoice, scheduleNote, makeChordBus, makeReverbBus, REVERB } from '/src/lib/midi.js'
import { arrange } from '/src/lib/arranger/index.js'
import { presetCfg } from '/src/lib/arranger/presets.js'

// A representative fragment: melody with rests + long notes, chords changing under it.
const content = {
  key: 'C', timeSignature: '4/4',
  lines: [
    [
      { type: 'segment', note: '1', chord: 'C', lyric: 'a' },
      { type: 'segment', note: '3', chord: '', lyric: 'b' },
      { type: 'segment', note: '5', chord: 'F', lyric: 'c' },
      { type: 'bar' },
      { type: 'segment', note: '5', chord: 'G', lyric: 'd' },
      { type: 'segment', note: '0', chord: '', lyric: '' },
      { type: 'segment', note: '3', chord: 'C', lyric: 'f' },
      { type: 'segment', note: '1---', chord: '', lyric: 'g' },
    ],
  ],
}
const BPM = 80, SPB = 60 / BPM, SR = 44100

async function renderPeak(voices, arranger, extraCfg = {}) {
  const notes = songToNotes(content)
  const chordEvents = voices === 'melody' ? [] : buildChordVoice(notes)
  const totalBeats = notes.reduce((s, n) => s + n.beats, 0)
  const len = totalBeats * SPB + 3.5 // room for a reverb tail
  const oac = new OfflineAudioContext(2, Math.ceil(SR * len), SR)
  const rv = extraCfg.reverb ? REVERB[extraCfg.reverb] : null
  const fx = rv ? makeReverbBus(oac, oac.destination, rv) : null
  const busIn = fx ? fx.input : oac.destination
  const chordBus = makeChordBus(oac, busIn)
  const perf = arrange(notes, chordEvents, { arranger, voices, chordGain: 0.055, ...extraCfg }, { songId: 'verify', pass: 0, timeSignature: '4/4', keyRoot: 60 })
  let lastNoteEnd = 0
  for (const e of perf) {
    const isMel = e.role === 'melody'
    const startT = 0.08 + e.startBeat * SPB + (e.timeShift || 0)
    const rawDur = e.beats * SPB
    const soundDur = isMel ? Math.max(0.08, rawDur - 0.07) : Math.max(0.1, rawDur - 0.05)
    scheduleNote(oac, isMel ? busIn : chordBus, e.midi, startT, soundDur, 0, e.gain, e.attack, e.decayTo)
    lastNoteEnd = Math.max(lastNoteEnd, startT + soundDur)
  }
  const buf = await oac.startRendering()
  const chL = buf.getChannelData(0), chR = buf.getChannelData(1)
  let peak = 0, tail = 0, lr = 0
  const tailFrom = Math.floor((lastNoteEnd + 0.2) * SR)
  for (let i = 0; i < chL.length; i++) {
    const a = Math.max(Math.abs(chL[i]), Math.abs(chR[i]))
    if (a > peak) peak = a
    if (i >= tailFrom && a > tail) tail = a
    lr += Math.abs(chL[i] - chR[i])
  }
  return { peak, tail, stereo: lr / chL.length }
}

// Humanize spread, measured on the melody onset times (seconds off the grid).
function spread(arranger) {
  const notes = songToNotes(content)
  const chordEvents = buildChordVoice(notes)
  const perf = arrange(notes, chordEvents, { arranger, voices: 'both', chordGain: 0.055 }, { songId: 'verify', pass: 0 })
  const mel = perf.filter((e) => e.role === 'melody').map((e) => e.timeShift)
  const ch = perf.filter((e) => e.role !== 'melody').map((e) => e.timeShift)
  const maxAbs = (a) => Math.max(...a.map(Math.abs))
  return { melMaxMs: (maxAbs(mel) * 1000).toFixed(2), chMaxMs: (maxAbs(ch) * 1000).toFixed(2), melShifts: mel.map((x) => (x * 1000).toFixed(1)) }
}

const db = (r) => (20 * Math.log10(r)).toFixed(1)
try {
  const both = await renderPeak('both', true)
  const mel = await renderPeak('melody', true)
  const chords = await renderPeak('chords', true)
  const calm = await renderPeak('both', true, presetCfg('piano-calm'))
  const arr = await renderPeak('both', true, presetCfg('piano-arrangement'))
  const dryArr = await renderPeak('both', true, { ...presetCfg('piano-arrangement'), reverb: 'none' })
  const offSpread = spread(false)
  const onSpread = spread(true)
  const res = {
    'peak both (0<p<=0.9)': both.peak.toFixed(4),
    'peak melody-only': mel.peak.toFixed(4),
    'peak chords-only': chords.peak.toFixed(4),
    'melody louder than chord': mel.peak > chords.peak,
    'no clip both/calm/arr (<=0.9)': [both.peak, calm.peak, arr.peak].every((p) => p <= 0.9),
    'peak>0 both/calm/arr': [both.peak, calm.peak, arr.peak].every((p) => p > 0),
    'preset piano-calm peak': calm.peak.toFixed(4),
    'preset piano-arrangement peak': arr.peak.toFixed(4),
    'reverb tail after last note (church, expect>0)': arr.tail.toFixed(4),
    'reverb OFF tail (expect ~0)': dryArr.tail.toFixed(5),
    'reverb adds a tail': arr.tail > dryArr.tail,
    'arrangement is stereo (pan, expect>0)': arr.stereo.toFixed(5),
    'humanize OFF melody spread (ms, =0)': offSpread.melMaxMs,
    'humanize ON melody spread (ms)': onSpread.melMaxMs,
    'humanize ON chord spread (ms, < melody)': onSpread.chMaxMs,
    'chord spread < melody spread': Number(onSpread.chMaxMs) < Number(onSpread.melMaxMs),
  }
  const pass = both.peak > 0 && [both.peak, calm.peak, arr.peak].every((p) => p > 0 && p <= 0.9) &&
    mel.peak > chords.peak && Number(offSpread.melMaxMs) === 0 && Number(onSpread.melMaxMs) > 0 &&
    Number(onSpread.chMaxMs) < Number(onSpread.melMaxMs) && arr.tail > dryArr.tail && arr.stereo > 0
  document.getElementById('out').textContent = (pass ? '✅ ALL AUDIO CHECKS PASS\n\n' : '❌ CHECK FAILED\n\n') + JSON.stringify(res, null, 2)
  document.title = pass ? 'AUDIO PASS' : 'AUDIO FAIL'
} catch (err) {
  document.getElementById('out').textContent = '❌ ERROR: ' + err.message + '\n' + err.stack
  document.title = 'AUDIO ERROR'
}
</script>
</body>
</html>
