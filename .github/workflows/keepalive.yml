name: Supabase keep-alive

# Free-tier Supabase pauses projects after ~1 week without API activity.
# Ping the songs table every 2 days to keep it awake.
on:
  schedule:
    - cron: '17 0 */2 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          curl -sf "https://vlpuvaofbzdawgjjpgfu.supabase.co/rest/v1/songs?select=id&limit=1" \
            -H "apikey: sb_publishable_iRpQjoext0BgPQXifwwgnw_kCnjFonX" > /dev/null
          echo "Supabase is awake."
